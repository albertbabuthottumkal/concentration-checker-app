<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Neural Training</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="auth-page">
    <div class="auth-container">
        <a href="/" class="back-link">← Return to Hub</a>
        
        <div class="auth-card">
            <h1 class="auth-title">Neural Synchronization</h1>
            <p class="auth-subtitle">Establish connection to access performance data.</p>
            
            {% if error %}
            <div class="auth-error">{{ error }}</div>
            {% endif %}
            
            <form action="{{ url_for('login') }}" method="POST" class="auth-form">
                <div class="form-group">
                    <label for="username">Operator ID</label>
                    <input type="text" id="username" name="username" required autocomplete="off" spellcheck="false" class="auth-input">
                </div>
                
                <div class="form-group">
                    <label for="password">Decryption Key</label>
                    <input type="password" id="password" name="password" required class="auth-input">
                </div>
                
                <button type="submit" class="auth-btn">Synchronize</button>
            </form>
            
            <p class="auth-switch">Unregistered operator? <a href="{{ url_for('register') }}" class="cyan">Initialize profile</a></p>
        </div>
    </div>
</body>
</html>
